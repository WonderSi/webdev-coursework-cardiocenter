spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/cardio_db
    username: cardio_user
    password: cardio_pass
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 20000

  data:
    redis:
      host: localhost
      port: 6379
      password: redis_pass
      timeout: 2000ms

  jpa:
    show-sql: true

logging:
  level:
    com.medical: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type: TRACE