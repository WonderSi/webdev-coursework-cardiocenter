files: ^ml/

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: "v6.0.0"
    hooks:
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/abravalheri/validate-pyproject
    rev: "v0.25"
    hooks:
      - id: validate-pyproject
        files: ^ml/pyproject\.toml$
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: "0.11.3"
    hooks:
      - id: uv-lock
        name: check uv lock file consistency
        args: [ "--locked", "--directory", "ml"]
        files: ^ml/(pyproject\.toml|uv\.lock)$
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff-check
        args: [ --fix, --show-fixes ]
      - id: ruff-format
  - repo: local
    hooks:
      - id: ty-check
        name: Check types with ty
        language: system
        entry: uv run ty
        args: [ "check" ]
        types: [ python ]
  - repo: local
    hooks:
      - id: commitizen
        name: Check commit messages with Commitizen
        language: python
        entry: uv run cz check
        args: [ --allow-abort, --commit-msg-file ]
        stages: [ commit-msg ]
